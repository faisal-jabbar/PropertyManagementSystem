<div class="ph">
  <h2>Rent Ledger</h2>
  <div class="filters">
    <mat-form-field appearance="outline" class="sf"><mat-label>Status</mat-label><mat-select [(ngModel)]="selectedStatus" (selectionChange)="filter()"><mat-option value="">All</mat-option><mat-option *ngFor="let s of statuses" [value]="s">{{s}}</mat-option></mat-select></mat-form-field>
    <mat-form-field appearance="outline" class="sf2"><mat-label>Search...</mat-label><input matInput (keyup)="search($event)"><mat-icon matSuffix>search</mat-icon></mat-form-field>
  </div>
</div>
<mat-card class="tc">
  <table mat-table [dataSource]="dataSource" matSort class="fw">
    <ng-container matColumnDef="dueDate"><th mat-header-cell *matHeaderCellDef mat-sort-header>Due Date</th><td mat-cell *matCellDef="let r">{{r.dueDate}}</td></ng-container>
    <ng-container matColumnDef="tenantName"><th mat-header-cell *matHeaderCellDef>Tenant</th><td mat-cell *matCellDef="let r">{{r.tenantName}}</td></ng-container>
    <ng-container matColumnDef="unitNo"><th mat-header-cell *matHeaderCellDef>Unit</th><td mat-cell *matCellDef="let r">{{r.unitNo}}</td></ng-container>
    <ng-container matColumnDef="amount"><th mat-header-cell *matHeaderCellDef>Amount</th><td mat-cell *matCellDef="let r">SAR {{r.amount|number}}</td></ng-container>
    <ng-container matColumnDef="paidAmount"><th mat-header-cell *matHeaderCellDef>Paid</th><td mat-cell *matCellDef="let r">SAR {{r.paidAmount|number}}</td></ng-container>
    <ng-container matColumnDef="balance"><th mat-header-cell *matHeaderCellDef>Balance</th><td mat-cell *matCellDef="let r" [class.text-red]="balance(r)>0">SAR {{balance(r)|number}}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span [class]="statusClass(r.status)">{{r.status}}</span></td></ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button color="primary" matTooltip="Record Payment" (click)="recordPayment(r)" *ngIf="authApi.isAdmin() && r.status!=='Paid' && r.status!=='Waived'"><mat-icon>add_card</mat-icon></button>
        <button mat-icon-button color="accent" matTooltip="Verify" (click)="verify(r)" *ngIf="authApi.isAdmin() && r.proofUrl && r.status!=='Paid'"><mat-icon>verified</mat-icon></button>
        <a mat-icon-button [href]="r.proofUrl" target="_blank" matTooltip="View Proof" *ngIf="r.proofUrl"><mat-icon>attach_file</mat-icon></a>
        <label mat-icon-button matTooltip="Upload Proof" *ngIf="r.status!=='Paid' && r.status!=='Waived'">
          <mat-icon>upload</mat-icon><input type="file" hidden (change)="uploadProof(r, $event)">
        </label>
        <button mat-icon-button matTooltip="Waive" (click)="waive(r)" *ngIf="authApi.isAdmin() && r.status!=='Paid' && r.status!=='Waived'"><mat-icon>remove_circle_outline</mat-icon></button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let r; columns:displayedColumns"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[15,30,50]" showFirstLastButtons></mat-paginator>
</mat-card>
