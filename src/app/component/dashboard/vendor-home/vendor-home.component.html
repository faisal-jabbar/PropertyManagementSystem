<div class="ph"><h2>My Assigned Jobs</h2></div>
<mat-card class="tc">
  <table mat-table [dataSource]="tickets" class="fw">
    <ng-container matColumnDef="ticketNo"><th mat-header-cell *matHeaderCellDef>#</th><td mat-cell *matCellDef="let r">{{r.ticketNo}}</td></ng-container>
    <ng-container matColumnDef="unitNo"><th mat-header-cell *matHeaderCellDef>Unit</th><td mat-cell *matCellDef="let r">{{r.unitNo}}</td></ng-container>
    <ng-container matColumnDef="category"><th mat-header-cell *matHeaderCellDef>Category</th><td mat-cell *matCellDef="let r">{{r.category}}</td></ng-container>
    <ng-container matColumnDef="priority"><th mat-header-cell *matHeaderCellDef>Priority</th><td mat-cell *matCellDef="let r">{{r.priority}}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r">{{r.status}}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let r; columns:cols"></tr>
  </table>
  <p *ngIf="!tickets.length" class="empty">No jobs assigned yet</p>
</mat-card>
