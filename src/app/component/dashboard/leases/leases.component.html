<div class="ph"><h2>Leases</h2><button mat-raised-button color="primary" (click)="open()" id="addLeaseBtn"><mat-icon>add</mat-icon>New Lease</button></div>
<mat-card class="tc">
  <table mat-table [dataSource]="dataSource" class="fw">
    <ng-container matColumnDef="tenantName"><th mat-header-cell *matHeaderCellDef>Tenant</th><td mat-cell *matCellDef="let r">{{r.tenantName}}</td></ng-container>
    <ng-container matColumnDef="unitNo"><th mat-header-cell *matHeaderCellDef>Unit</th><td mat-cell *matCellDef="let r"><strong>{{r.unitNo}}</strong></td></ng-container>
    <ng-container matColumnDef="startDate"><th mat-header-cell *matHeaderCellDef>Start</th><td mat-cell *matCellDef="let r">{{r.startDate}}</td></ng-container>
    <ng-container matColumnDef="endDate"><th mat-header-cell *matHeaderCellDef>End</th><td mat-cell *matCellDef="let r">{{r.endDate}}<br><small [style.color]="daysLeft(r.endDate)<30?'red':'#888'">{{daysLeft(r.endDate)}}d left</small></td></ng-container>
    <ng-container matColumnDef="rentAmount"><th mat-header-cell *matHeaderCellDef>Rent (SAR)</th><td mat-cell *matCellDef="let r">{{r.rentAmount|number}}</td></ng-container>
    <ng-container matColumnDef="frequency"><th mat-header-cell *matHeaderCellDef>Frequency</th><td mat-cell *matCellDef="let r">{{r.frequency}}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span [class]="statusClass(r.status)">{{r.status}}</span></td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let r"><button mat-icon-button color="primary" (click)="open(r)" matTooltip="Edit"><mat-icon>edit</mat-icon></button><button mat-icon-button color="warn" (click)="terminate(r)" matTooltip="Terminate" *ngIf="r.status==='Active'"><mat-icon>cancel</mat-icon></button></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let r; columns:displayedColumns"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons></mat-paginator>
</mat-card>
