<div class="ph"><h2>Expenses</h2><div style="display:flex;gap:12px;align-items:center"><span class="tot">Total: SAR {{totalAmount|number}}</span><button mat-raised-button color="primary" (click)="add()" id="addExpenseBtn"><mat-icon>add</mat-icon>Add Expense</button></div></div>
<mat-card class="tc">
  <table mat-table [dataSource]="dataSource" class="fw">
    <ng-container matColumnDef="date"><th mat-header-cell *matHeaderCellDef>Date</th><td mat-cell *matCellDef="let r">{{r.date}}</td></ng-container>
    <ng-container matColumnDef="category"><th mat-header-cell *matHeaderCellDef>Category</th><td mat-cell *matCellDef="let r">{{r.category}}</td></ng-container>
    <ng-container matColumnDef="ownerName"><th mat-header-cell *matHeaderCellDef>Owner</th><td mat-cell *matCellDef="let r">{{r.ownerName||'—'}}</td></ng-container>
    <ng-container matColumnDef="propertyName"><th mat-header-cell *matHeaderCellDef>Property</th><td mat-cell *matCellDef="let r">{{r.propertyName||'—'}}</td></ng-container>
    <ng-container matColumnDef="amount"><th mat-header-cell *matHeaderCellDef>Amount (SAR)</th><td mat-cell *matCellDef="let r" style="font-weight:600">{{r.amount|number}}</td></ng-container>
    <ng-container matColumnDef="responsibility"><th mat-header-cell *matHeaderCellDef>Charged To</th><td mat-cell *matCellDef="let r">{{r.responsibility}}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span [class]="statusClass(r.status)">{{r.status}}</span></td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let r"><a mat-icon-button [href]="r.attachmentUrl" target="_blank" *ngIf="r.attachmentUrl" matTooltip="View Attachment"><mat-icon>attach_file</mat-icon></a><button mat-icon-button color="warn" (click)="delete(r.id)"><mat-icon>delete</mat-icon></button></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let r; columns:displayedColumns"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons></mat-paginator>
</mat-card>
