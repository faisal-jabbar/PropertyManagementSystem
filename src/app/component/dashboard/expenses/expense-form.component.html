<h2 mat-dialog-title>{{title}}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">
    <mat-form-field appearance="outline"><mat-label>Owner</mat-label><mat-select formControlName="ownerId" (selectionChange)="onOwnerChange($event.value)"><mat-option value="">— None —</mat-option><mat-option *ngFor="let o of owners" [value]="o.id">{{o.name}}</mat-option></mat-select></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Category *</mat-label><mat-select formControlName="category"><mat-option *ngFor="let c of categories" [value]="c">{{c}}</mat-option></mat-select></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Amount (SAR) *</mat-label><input matInput type="number" formControlName="amount"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Charged To *</mat-label><mat-select formControlName="responsibility"><mat-option *ngFor="let r of responsibilities" [value]="r">{{r}}</mat-option></mat-select></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Date *</mat-label><input matInput type="date" formControlName="date"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Status</mat-label><mat-select formControlName="status"><mat-option value="Pending">Pending</mat-option><mat-option value="Approved">Approved</mat-option><mat-option value="Rejected">Rejected</mat-option></mat-select></mat-form-field>
    <mat-form-field appearance="outline" style="grid-column:span 2"><mat-label>Description</mat-label><textarea matInput formControlName="description" rows="2"></textarea></mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end"><button mat-button (click)="cancel()">Cancel</button><button mat-raised-button color="primary" (click)="save()">{{buttonName}}</button></mat-dialog-actions>
