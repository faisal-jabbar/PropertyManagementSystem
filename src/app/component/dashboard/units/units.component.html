<div class="ph"><h2>Units</h2><button mat-raised-button color="primary" (click)="open()" id="addUnitBtn"><mat-icon>add</mat-icon>Add Unit</button></div>
<mat-card class="tc">
  <mat-form-field appearance="outline" class="pf"><mat-label>Filter by Property</mat-label><mat-select [(ngModel)]="selectedPropertyId" (selectionChange)="applyFilter()"><mat-option value="">All Properties</mat-option><mat-option *ngFor="let p of properties" [value]="p.id">{{p.p_name||p.name}}</mat-option></mat-select></mat-form-field>
  <table mat-table [dataSource]="dataSource" class="fw">
    <ng-container matColumnDef="propertyName"><th mat-header-cell *matHeaderCellDef>Property</th><td mat-cell *matCellDef="let r">{{getPropName(r.propertyId)}}</td></ng-container>
    <ng-container matColumnDef="unitNo"><th mat-header-cell *matHeaderCellDef>Unit No</th><td mat-cell *matCellDef="let r"><strong>{{r.unitNo}}</strong></td></ng-container>
    <ng-container matColumnDef="floor"><th mat-header-cell *matHeaderCellDef>Floor</th><td mat-cell *matCellDef="let r">{{r.floor}}</td></ng-container>
    <ng-container matColumnDef="type"><th mat-header-cell *matHeaderCellDef>Type</th><td mat-cell *matCellDef="let r">{{r.type}}</td></ng-container>
    <ng-container matColumnDef="bedrooms"><th mat-header-cell *matHeaderCellDef>Beds/Baths</th><td mat-cell *matCellDef="let r">{{r.bedrooms}}B / {{r.bathrooms}}Ba</td></ng-container>
    <ng-container matColumnDef="targetRent"><th mat-header-cell *matHeaderCellDef>Target Rent</th><td mat-cell *matCellDef="let r">SAR {{r.targetRent|number}}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span [class]="statusClass(r.status)">{{r.status}}</span></td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let r"><button mat-icon-button color="primary" (click)="open(r)"><mat-icon>edit</mat-icon></button><button mat-icon-button color="warn" (click)="delete(r.id)"><mat-icon>delete</mat-icon></button></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let r; columns:displayedColumns"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons></mat-paginator>
</mat-card>
