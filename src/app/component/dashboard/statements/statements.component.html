<div class="ph"><h2>Owner Statements</h2><button mat-raised-button color="primary" (click)="generate()" *ngIf="authApi.isAdmin()" id="genStatementBtn"><mat-icon>add</mat-icon>Generate Statement</button></div>
<mat-card class="tc">
  <table mat-table [dataSource]="dataSource" class="fw">
    <ng-container matColumnDef="ownerName"><th mat-header-cell *matHeaderCellDef>Owner</th><td mat-cell *matCellDef="let r"><strong>{{r.ownerName}}</strong></td></ng-container>
    <ng-container matColumnDef="periodStart"><th mat-header-cell *matHeaderCellDef>Period Start</th><td mat-cell *matCellDef="let r">{{r.periodStart}}</td></ng-container>
    <ng-container matColumnDef="periodEnd"><th mat-header-cell *matHeaderCellDef>Period End</th><td mat-cell *matCellDef="let r">{{r.periodEnd}}</td></ng-container>
    <ng-container matColumnDef="rentTotal"><th mat-header-cell *matHeaderCellDef>Rent</th><td mat-cell *matCellDef="let r">SAR {{r.rentTotal|number}}</td></ng-container>
    <ng-container matColumnDef="expenseTotal"><th mat-header-cell *matHeaderCellDef>Expenses</th><td mat-cell *matCellDef="let r">SAR {{r.expenseTotal|number}}</td></ng-container>
    <ng-container matColumnDef="feeTotal"><th mat-header-cell *matHeaderCellDef>Mgmt Fee</th><td mat-cell *matCellDef="let r">SAR {{r.feeTotal|number}}</td></ng-container>
    <ng-container matColumnDef="payoutAmount"><th mat-header-cell *matHeaderCellDef>Net Payout</th><td mat-cell *matCellDef="let r" class="payout">SAR {{r.payoutAmount|number}}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span [class]="statusClass(r.status)">{{r.status}}</span></td></ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon>more_vert</mat-icon></button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="setStatus(r,'Sent')"><mat-icon>send</mat-icon>Mark Sent</button>
          <button mat-menu-item (click)="setStatus(r,'Approved')"><mat-icon>thumb_up</mat-icon>Approve</button>
          <button mat-menu-item (click)="recordPayout(r)"><mat-icon>payments</mat-icon>Record Payout</button>
          <button mat-menu-item (click)="setStatus(r,'Disputed')" style="color:red"><mat-icon>report_problem</mat-icon>Disputed</button>
          <button mat-menu-item (click)="setStatus(r,'Closed')"><mat-icon>lock</mat-icon>Close</button>
        </mat-menu>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let r; columns:displayedColumns"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons></mat-paginator>
</mat-card>
