<div class="ph"><h2>Maintenance Tickets</h2><button mat-raised-button color="primary" (click)="add()" id="addTicketBtn"><mat-icon>add</mat-icon>New Request</button></div>
<mat-card class="tc">
  <div class="fr">
    <mat-form-field appearance="outline" class="sf"><mat-label>Filter by Status</mat-label><mat-select [(ngModel)]="selectedStatus" (selectionChange)="filter()"><mat-option value="">All</mat-option><mat-option *ngFor="let s of statuses" [value]="s">{{s}}</mat-option></mat-select></mat-form-field>
    <mat-form-field appearance="outline" class="sf2"><mat-label>Search...</mat-label><input matInput (keyup)="search($event)"><mat-icon matSuffix>search</mat-icon></mat-form-field>
  </div>
  <table mat-table [dataSource]="dataSource" class="fw">
    <ng-container matColumnDef="ticketNo"><th mat-header-cell *matHeaderCellDef>#</th><td mat-cell *matCellDef="let r">{{r.ticketNo||r.id?.substring(0,6)}}</td></ng-container>
    <ng-container matColumnDef="unitNo"><th mat-header-cell *matHeaderCellDef>Unit</th><td mat-cell *matCellDef="let r">{{r.unitNo}}</td></ng-container>
    <ng-container matColumnDef="category"><th mat-header-cell *matHeaderCellDef>Category</th><td mat-cell *matCellDef="let r">{{r.category}}</td></ng-container>
    <ng-container matColumnDef="priority"><th mat-header-cell *matHeaderCellDef>Priority</th><td mat-cell *matCellDef="let r"><span [class]="priorityClass(r.priority)">{{r.priority}}</span></td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span [class]="statusClass(r.status)">{{r.status}}</span></td></ng-container>
    <ng-container matColumnDef="assignedVendorName"><th mat-header-cell *matHeaderCellDef>Vendor</th><td mat-cell *matCellDef="let r">{{r.assignedVendorName||'—'}}</td></ng-container>
    <ng-container matColumnDef="costEstimate"><th mat-header-cell *matHeaderCellDef>Cost Est.</th><td mat-cell *matCellDef="let r">{{r.costEstimate?'SAR '+(r.costEstimate|number):'—'}}</td></ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon>more_vert</mat-icon></button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="setStatus(r,'Under Review')"><mat-icon>preview</mat-icon>Under Review</button>
          <button mat-menu-item (click)="assignVendor(r)"><mat-icon>person_add</mat-icon>Assign Vendor</button>
          <button mat-menu-item (click)="recordCost(r)"><mat-icon>attach_money</mat-icon>Record Cost</button>
          <button mat-menu-item (click)="setStatus(r,'Approved')"><mat-icon>thumb_up</mat-icon>Approve</button>
          <button mat-menu-item (click)="setStatus(r,'In Progress')"><mat-icon>engineering</mat-icon>In Progress</button>
          <button mat-menu-item (click)="setStatus(r,'Completed')"><mat-icon>check_circle</mat-icon>Completed</button>
          <button mat-menu-item (click)="setStatus(r,'Closed')"><mat-icon>lock</mat-icon>Close</button>
          <button mat-menu-item (click)="setStatus(r,'Rejected')" style="color:red"><mat-icon>cancel</mat-icon>Reject</button>
        </mat-menu>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let r; columns:displayedColumns"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons></mat-paginator>
</mat-card>
