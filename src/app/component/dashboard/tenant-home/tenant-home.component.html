<div class="kpi-grid">
  <mat-card class="kpi" style="background:linear-gradient(135deg,#1565c0,#1976d2);color:white"><mat-icon>payments</mat-icon><div class="kv">SAR {{totalDue|number}}</div><div>Total Due</div></mat-card>
  <mat-card class="kpi" style="background:linear-gradient(135deg,#c62828,#d32f2f);color:white"><mat-icon>warning</mat-icon><div class="kv">{{overdueCount}}</div><div>Overdue</div></mat-card>
  <mat-card class="kpi" style="background:linear-gradient(135deg,#2e7d32,#388e3c);color:white"><mat-icon>check_circle</mat-icon><div class="kv">{{paidCount}}</div><div>Paid</div></mat-card>
  <mat-card class="kpi" style="background:linear-gradient(135deg,#4a148c,#6a1b9a);color:white"><mat-icon>build</mat-icon><div class="kv">{{openTickets}}</div><div>Open Tickets</div></mat-card>
</div>
